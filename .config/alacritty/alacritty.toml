# ~/.config/alacritty/alacritty.toml

# [general]
# clone https://github.com/alacritty/alacritty-theme
#import = ["~/.config/alacritty/themes/themes/kanagawa_wave.toml"] # import colorscheme


[window]
padding = { x = 8, y = 8 }     # inner padding in pixels between text and window edge
decorations = "buttonless"      # hides title bar on mac, keeps traffic light buttons
option_as_alt = "Both"          # makes Option key send Alt, fixes Alt keybindings in Neovim

[font]
size = 10                     # font size in points

[font.normal]
family = "JetBrainsMono Nerd Font"  # nerd font variant includes icons for statusline plugins
style  = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style  = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style  = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style  = "Bold Italic"

[env]
TERM = "xterm-256color"         # tells applications what terminal capabilities are available
                                # xterm-256color is safer than "alacritty" for SSH and tmux
                                # compatibility as some remote servers lack alacritty terminfo

[cursor]
style = { shape = "Block", blinking = "Off" }   # block cursor, no blinking
unfocused_hollow = true         # hollow block cursor when window loses focus

[mouse]
hide_when_typing = true         # hide mouse cursor while typing

[scrolling]
history = 10000                 # lines of scrollback buffer
                                # tmux handles most scrolling in practice but useful outside tmux

# Copied from https://github.com/alacritty/alacritty-theme/blob/master/themes/kanagawa_wave.toml for portability
[colors.primary]
background = '#1f1f28'
foreground = '#dcd7ba'

[colors.normal]
black   = '#090618'
red     = '#c34043'
green   = '#76946a'
yellow  = '#c0a36e'
blue    = '#7e9cd8'
magenta = '#957fb8'
cyan    = '#6a9589'
white   = '#c8c093'

[colors.bright]
black   = '#727169'
red     = '#e82424'
green   = '#98bb6c'
yellow  = '#e6c384'
blue    = '#7fb4ca'
magenta = '#938aa9'
cyan    = '#7aa89f'
white   = '#dcd7ba'

[colors.selection]
background = '#2d4f67'
foreground = '#c8c093'

[[colors.indexed_colors]]
index = 16
color = '#ffa066'

[[colors.indexed_colors]]
index = 17
color = '#ff5d62'

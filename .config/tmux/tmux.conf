# ~/.config/tmux/tmux.conf

# Set the prefix from C-b to C-a (-g = global)
set -g prefix C-a

# Give me 800ms to repeat -r commands
set -g repeat-time 800

# Ensure that we can send Ctrl-A to to other apps running in tmux (press it twice)
bind C-a send-prefix

# Unbind the original Ctrl-b prefix
unbind C-b

# Set the delay between prefix and command
set -s escape-time 1

# Set the base index for windows to 1 instead of 0
set -g base-index 1

# Set the base index for panes to 1 instead of 0
set -w -g pane-base-index 1

# Reload configuration file with Prefix r
bind r \
    source-file ~/.config/tmux/tmux.conf \; \
    display-message "Configuration reloaded"

# Split panes with | (horizontal (vertical in vim terminology)) and - (vertical (horizontal in vim))
# Opens pane in current selected pane's path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Move between panes with Prefix h,j,k,l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Move between windows with C-h (left) and C-l (right)
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Resize panes with vim keys (shift)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Mouse support disabled (gets annoying clicking back to terminal from something else and my pane switching)
set -g mouse off

# Set the default terminal mode to 256color (lights, cameras, action!!)
set -g default-terminal "tmux-256color"
# set -a terminal-features 'xterm-256color:RGB' - try if colors broken in neovim

# Set the status line's colors
set -g status-style fg=white,bold,bg=black

# Set the color of the window list
set -g window-status-style fg=cyan,bg=default

# Set the colors for the active window
set -g window-status-current-style fg=white,bold,bg=red

# Colors for pane borders
set -w -g pane-border-style fg=green,bg=black
set -w -g pane-active-border-style fg=black,bg=green

# Pane border style options: single, double, heavy, simple, number.
set -w -g pane-border-lines single

# Add indicators for two-pane setup
set -g pane-border-indicators arrows

# Add status to panes
set -g pane-border-status top

# Command / message line - useful to make tmux command line look different to vim's
set -g message-style fg=white,bg=color242,bold

# Status line left side to show Session: [name] [window] [pane]
set -g status-left-length 40
set -g status-left "#[fg=green]S:#S #[fg=yellow]W:#I #[fg=cyan]P:#P"

# Status line right side - 31-Oct 13:37
set -g status-right "#[fg=cyan]%d %b %R"

# Center the window list in the status line
set -g status-justify centre

# Update the status line every sixty seconds (default is 15)
set -g status-interval 60

# Enable activity alerts
# set -w -g monitor-activity on
# set -w -g visual-activity on

# Disable activity bells - we're trying to focus here!!
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Enable vi keys in Copy mode
set -w -g mode-keys vi

# bind Escape copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel '#{@copy_command}'
unbind p
bind p paste-buffer

# Check for x11/Wayland and set correct copy/paste command
if-shell '[ "$XDG_SESSION_TYPE" = "wayland" ]' \
    'set -g @copy_command "wl-copy"; \
     set -g @paste_command "wl-paste -n"' \
    'set -g @copy_command "xclip -sel clip -i"; \
     set -g @paste_command "xclip -sel clip -o"'

bind C-c run 'tmux save-buffer - | #{@copy_command}'
bind C-v run-shell '#{@paste_command} | tmux load-buffer -' \; paste-buffer

# Split window and run node console - it will close automatically when finished.
# Useful for test suites, SSH connections etc. E.g. could run project test suite with
# just one keybind. Set this up per-project with a .conf file?
# keybind for tests... if you want the split to persist after command finishes: use send-keys.
# bind-key R run "(tmux split-window -v node)"

# Shortcut for synchronize-panes toggle - rarely used but USEFUL when it is!
bind C-s set-window-option synchronize-panes

# Display popup window centred horizonally and vertically 50% width, running a new shell in home dir
bind O display-popup -d "~/" \
                        -x C -y C -w 50% -h 50% \
                        -e "POPUP=true" -E "zsh"

# Make session chooser order by name instead of by session index
bind s choose-tree -sZ -O name

# Load Mac-specific overrides
if-shell "uname | grep -q Darwin" "source-file ~/.config/tmux/tmux.mac.conf"

# Load private settings if they exist (too spicy for public repo)
if-shell "[ -f ~/.config/tmux/tmux.private.conf ]" "source ~/.config/tmux/tmux.private.conf"

# Toggle log output to a text file
bind P pipe-pane -o "cat >>~/.local/share/tmux/logs/#W-%Y-%m-%d.log" \; display "Toggled logging to #W-%Y-%m-%d.log"

